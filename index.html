<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO SYSTEM - FINAL REBUILD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--sidebar); color: white; padding: 20px 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; font-size: 14px; opacity: 0.7; }
        .nav-item.active { background: var(--primary); opacity: 1; border-radius: 0 25px 25px 0; margin-right: 10px; }
        .container { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-weight: bold; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .res-box { background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; min-height: 20px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 12px; }
        .main-content { display: none; }
        .active-content { display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="showTab('tab1', this)">RECORDING BPO</div>
        <div class="nav-item" onclick="showTab('tab2', this)">VENDOR COMMIT</div>
        <div class="nav-item" onclick="showTab('tab3', this)">DATABASE</div>
    </div>

    <div class="container">
        <div id="tab1" class="main-content active-content">
            <div class="card">
                <h3>TRA CỨU NHÂN VIÊN (TASK 1)</h3>
                <label>MÃ WFM (Cột I)</label>
                <input type="text" id="wfmInput" placeholder="Nhập mã ví dụ: S098195 rồi Enter" onkeypress="if(event.key==='Enter') doSearchPT()">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>HỌ TÊN</label><div class="res-box" id="outName">-</div></div>
                    <div><label>NHÀ THẦU</label><div class="res-box" id="outVendor">-</div></div>
                    <div><label>USER ID</label><div class="res-box" id="outUser">-</div></div>
                    <div><label>WFM ID</label><div class="res-box" id="outWfm">-</div></div>
                </div>
                <button class="btn" onclick="saveToSheet()">CONFIRM & LƯU</button>
            </div>
        </div>

        <div id="tab2" class="main-content">
            <div class="card">
                <h3>TRA CỨU COMMIT (TASK 2)</h3>
                <label>CHỌN NGÀY</label>
                <input type="date" id="dateSearch">
                <button class="btn" onclick="doSearchCommit()">TÌM BOOKING</button>
                <table id="commitTable">
                    <thead><tr><th>DATE</th><th>WH</th><th>VENDOR</th><th>TEAM</th><th>BOOKING</th></tr></thead>
                    <tbody id="commitBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab3" class="main-content">
            <div class="card">
                <h3>LỊCH SỬ ĐÃ LƯU</h3>
                <button class="btn" style="width: 150px;" onclick="loadHistory()">REFRESH</button>
                <table id="dbTable">
                    <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>NAME</th><th>WFM ID</th></tr></thead>
                    <tbody id="dbBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const URL_PT = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv";
        const URL_COMMIT = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=915514461&single=true&output=csv";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxODk1r9vWCk9yQR4KR4FPszov3YE7KIWgwQI-qYvywxn9TS2db-HIbv5ofiuLj_TdQ/exec";

        let rawPT = [], rawCommit = [];

        window.onload = () => {
            fetchData();
            document.getElementById('dateSearch').value = new Date().toISOString().split('T')[0];
        };

        function fetchData() {
            Papa.parse(URL_PT, { download: true, complete: res => { rawPT = res.data; console.log("Data PT Loaded", rawPT.length); } });
            Papa.parse(URL_COMMIT, { download: true, complete: res => { rawCommit = res.data; console.log("Data Commit Loaded", rawCommit.length); } });
        }

        // TASK 1: TRA CỨU THEO CỘT I (INDEX 8)
        function doSearchPT() {
            const code = document.getElementById('wfmInput').value.trim().toUpperCase();
            if(!code) return;

            // Tìm từ dòng thứ 3 trở đi (bỏ qua header lằng nhằng)
            const result = rawPT.find(row => row[8] && row[8].toString().trim().toUpperCase() === code);

            if(result) {
                document.getElementById('outName').innerText = result[3] || "N/A"; // Cột D
                document.getElementById('outVendor').innerText = result[1] || "N/A"; // Cột B
                document.getElementById('outUser').innerText = result[9] || "N/A"; // Cột J
                document.getElementById('outWfm').innerText = result[8]; // Cột I
                window.lastFound = result;
            } else {
                alert("Đéo tìm thấy mã này trong file PT! Kiểm tra lại mã hoặc file gốc.");
            }
        }

        // TASK 2: TRA THEO NGÀY
        function doSearchCommit() {
            const d = document.getElementById('dateSearch').value; // yyyy-mm-dd
            const [y, m, day] = d.split('-');
            const format1 = `${day}/${m}/${y}`; // dd/mm/yyyy
            const format2 = `${parseInt(day)}/${parseInt(m)}/${y}`; // d/m/yyyy

            const filtered = rawCommit.filter(r => r[0] === format1 || r[0] === format2);
            
            let html = '';
            filtered.forEach(r => {
                html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[9]}</td></tr>`;
            });
            document.getElementById('commitBody').innerHTML = html || '<tr><td colspan="5">Không có dữ liệu cho ngày này</td></tr>';
        }

        async function saveToSheet() {
            if(!window.lastFound) return alert("Tra mã trước đã mày!");
            const data = {
                date: new Date().toLocaleDateString('vi-VN'),
                name: window.lastFound[3],
                wfmId: window.lastFound[8],
                vendor: window.lastFound[1]
            };
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(data) });
            alert("Lưu xong!");
            loadHistory();
        }

        async function loadHistory() {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            let html = '';
            data.forEach(r => {
                html += `<tr><td>${r.date}</td><td>-</td><td>-</td><td>-</td><td>${r.name}</td><td>${r.wfmId}</td></tr>`;
            });
            document.getElementById('dbBody').innerHTML = html;
        }

        function showTab(id, el) {
            document.querySelectorAll('.main-content').forEach(t => t.classList.remove('active-content'));
            document.getElementById(id).classList.add('active-content');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
