<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO SYSTEM - NO DATE TASK 1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --text-gray: #a3abc1; --danger: #ff5252; --success: #2ecc71; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .main-content { position: absolute; inset: 0; padding: 25px; overflow-y: auto; display: none; opacity: 0; transition: opacity 0.2s; }
        .main-content.active { display: block; opacity: 1; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; font-size: 14px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; font-weight: 600; color: #1b2559; box-sizing: border-box; margin-bottom: 10px; font-size: 13px; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e0e5f2; font-weight: bold; min-height: 20px; color: #1b2559; margin-bottom: 10px; font-size: 13px; }
        .table-container { background: white; border-radius: 20px; padding: 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 15px 12px; color: var(--text-gray); font-size: 10px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 12px; color: #1b2559; font-weight: 600; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="switchTab('recording', this)"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item" onclick="switchTab('database', this)"><i class="fas fa-database"></i> BPO Database</div>
    </div>

    <div class="container">
        <div id="recording" class="main-content active">
            <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px;">
                <div class="card">
                    <div class="card-title">INPUT WFM ID (TODAY)</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div><label>WH</label><select id="wh"><option>VNDB</option><option>VNDL</option></select></div>
                        <div><label>TEAM</label><select id="team"><option>Inbound</option><option>Inventory</option><option>FD</option><option>OB</option></select></div>
                        <div><label>TIME</label><select id="time"></select></div>
                        <div><label>SHIFT</label><select id="shift"><option>Day</option><option>Night</option></select></div>
                    </div>
                    <label>SCAN WFM ID</label>
                    <input type="text" id="wfmInput" placeholder="Nhập mã rùi Enter..." onkeypress="if(event.key==='Enter') checkInfo()">
                    <button class="btn-confirm" onclick="handleConfirm()">CONFIRM & SAVE</button>
                </div>
                <div class="card">
                    <div class="card-title">INFO DETAILS</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                        <div><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                        <div><label>NAME</label><div class="info-box" id="resName">-</div></div>
                        <div><label>WFM ID</label><div class="info-box" id="resID">-</div></div>
                        <div><label>USER WFM ID</label><div class="info-box" id="resUserId">-</div></div>
                    </div>
                    <label>STATUS</label><div class="info-box" id="resStatus" style="color: blue;">READY</div>
                </div>
            </div>
        </div>

        <div id="request" class="main-content">
            <div class="card">
                <div class="card-title">FILTER DATA REQUEST</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end;">
                    <div><label>Date</label><input type="date" id="reqDate"></div>
                    <div><label>Warehouse</label><select id="reqWh"><option value="All">All WH</option><option>VNDB</option><option>VNDL</option></select></div>
                    <div><label>Team</label><select id="reqTeam"><option value="All">All Team</option><option>Inbound</option><option>Inventory</option><option>FD</option><option>OB</option></select></div>
                    <button class="btn-search">SEARCH</button>
                </div>
            </div>
            <div class="card table-container">
                <table>
                    <thead><tr><th>Date</th><th>WH</th><th>Vendor</th><th>Team</th><th>Task</th><th>Booking</th></tr></thead>
                    <tbody id="reqBody"></tbody>
                </table>
            </div>
        </div>

        <div id="database" class="main-content">
            <div class="card">
                <div class="card-title">BPO MASTER DATABASE</div>
                <div style="display: flex; gap: 15px; align-items: flex-end;">
                    <div style="width: 200px;"><label>Filter Date</label><input type="date" id="dbDate" onchange="loadSharedDB()"></div>
                    <button class="btn-search" onclick="loadSharedDB()">REFRESH DB</button>
                </div>
            </div>
            <div class="card table-container">
                <table>
                    <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>WFM ID</th><th>USER ID</th><th>NAME</th></tr></thead>
                    <tbody id="masterBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_PT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwcHl4jkyNXnJN2FeAGiuNS5q0KdV-mghArP3uszwzB1giNolHpfB6AKzQNbQki_4F1/exec';

        let dataPT = [];
        let currentPending = null;

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            // Chỉ set date cho Task 2 và Task 3
            if(document.getElementById('reqDate')) document.getElementById('reqDate').value = today;
            if(document.getElementById('dbDate')) document.getElementById('dbDate').value = today;
            
            fillTime();
            preloadData();
            loadSharedDB(); // Task 3 tự load data ngày hôm nay
        };

        function fillTime() {
            const sel = document.getElementById('time');
            for(let i=0; i<48; i++) {
                let h = Math.floor(i/2).toString().padStart(2,'0'), m = i%2==0?'00':'30';
                sel.add(new Option(`${h}:${m}`, `${h}:${m}`));
            }
        }

        function preloadData() {
            Papa.parse(CSV_PT_URL, { download: true, skipEmptyLines: true, complete: res => { dataPT = res.data; } });
        }

        function checkInfo() {
            const id = document.getElementById('wfmInput').value.trim().toUpperCase();
            if(!id) return;
            const found = dataPT.find(row => row[8] && row[8].toString().trim().toUpperCase() === id);
            if(found) {
                currentPending = {
                    vendor: found[1], wfmId: found[8], userId: found[9] || "N/A", name: found[3],
                    wh: document.getElementById('wh').value,
                    team: document.getElementById('team').value,
                    time: document.getElementById('time').value
                };
                document.getElementById('resVendor').innerText = currentPending.vendor;
                document.getElementById('resName').innerText = currentPending.name;
                document.getElementById('resID').innerText = currentPending.wfmId;
                document.getElementById('resUserId').innerText = currentPending.userId;
                document.getElementById('resStatus').innerText = "✅ OK";
            } else { alert("ID sai rồi con bò!"); }
        }

        async function handleConfirm() {
            if(!currentPending) return alert("Quét ID trước đã!");
            const realDate = new Date().toISOString().split('T')[0]; 
            const dataToSave = { ...currentPending, date: realDate };
            document.getElementById('resStatus').innerText = "SAVING...";
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(dataToSave) });
            alert("Đã lưu!");
            document.getElementById('wfmInput').value = "";
            currentPending = null;
            document.getElementById('resStatus').innerText = "READY";
            loadSharedDB(); // Update Task 3 luôn
        }

        async function loadSharedDB() {
            const filterDate = document.getElementById('dbDate').value;
            const tbody = document.getElementById('masterBody');
            tbody.innerHTML = "<tr><td colspan='8'>Đang kéo data...</td></tr>";
            try {
                const res = await fetch(SCRIPT_URL);
                const allData = await res.json();
                const filtered = allData.filter(r => r.date === filterDate);
                if(filtered.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='8'>Ngày này chưa có ai làm hết!</td></tr>";
                } else {
                    tbody.innerHTML = filtered.map(r => `
                        <tr><td>${r.date}</td><td>${r.time}</td><td>${r.wh}</td><td>${r.team}</td><td>${r.vendor}</td><td>${r.wfmId}</td><td>${r.userId}</td><td>${r.name}</td></tr>
                    `).join('');
                }
            } catch(e) { tbody.innerHTML = "<tr><td colspan='8'>Lỗi database!</td></tr>"; }
        }

        function switchTab(t, el) {
            document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
