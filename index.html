<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO System - Stable Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --green: #10b981; --orange: #ff5722; --text-gray: #a3abc1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(77, 68, 255, 0.3); }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 25px; text-transform: uppercase; font-size: 16px; }
        
        /* FORM ELEMENTS */
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; outline: none; font-size: 14px; font-weight: 600; color: #1b2559; background: white; }
        
        /* RECORDING SPECIFIC */
        .scan-toggle { display: flex; gap: 10px; margin-bottom: 20px; background: #f4f7fe; padding: 5px; border-radius: 12px; }
        .btn-scan { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text-gray); background: transparent; }
        .btn-scan.active { background: white; color: var(--green); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .radio-group { display: flex; gap: 15px; align-items: center; height: 48px; }
        .radio-group label { display: flex !important; align-items: center !important; text-transform: none !important; margin-bottom: 0 !important; cursor: pointer; border: none !important; width: auto !important; }
        .radio-group input { width: auto !important; margin-right: 5px; }
        .info-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #f1f5f9; min-height: 20px; }
        .info-val { font-size: 14px; font-weight: 800; color: #1b2559; margin-top: 5px; }

        /* REQUEST SPECIFIC (MULTISELECT) */
        .multiselect { position: relative; width: 100%; }
        .selectBox { position: relative; cursor: pointer; }
        .overSelect { position: absolute; left: 0; right: 0; top: 0; bottom: 0; }
        #checkboxes { display: none; border: 1px solid #e0e5f2; border-radius: 12px; background: white; position: absolute; width: 100%; z-index: 100; padding: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #checkboxes label { display: flex !important; align-items: center !important; text-transform: none !important; font-size: 13px !important; border: none !important; padding: 8px 5px !important; color: #1b2559 !important; font-weight: 600 !important; }
        #checkboxes input { width: auto !important; margin-right: 10px !important; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-gray); font-size: 11px; font-weight: 800; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #1b2559; font-weight: 600; }
        .status-tag { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; background: #e6fffa; color: #065f46; }
        .btn-search { background: var(--orange); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; height: 48px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" id="m-recording" onclick="switchTab('recording')"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" id="m-request" onclick="switchTab('request')"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item" onclick="switchTab('fillrate')"><i class="fas fa-chart-line"></i> Fill rate</div>
    </div>

    <div id="recording" class="main-content active">
        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px;">
            <div class="card">
                <div class="card-title">INPUT WFM ID</div>
                <div class="scan-toggle">
                    <button class="btn-scan active" id="btnIn" onclick="setScan('IN')"><i class="fas fa-sign-in-alt"></i> SCAN IN</button>
                    <button class="btn-scan" id="btnOut" onclick="setScan('OUT')"><i class="fas fa-sign-out-alt"></i> SCAN OUT</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1.2fr 1fr; gap:15px; margin-bottom: 20px;">
                    <div><label>Project Code</label>
                        <div class="radio-group">
                            <label><input type="radio" name="pCode" value="VNDB" checked> VNDB</label>
                            <label><input type="radio" name="pCode" value="VNDL"> VNDL</label>
                        </div>
                    </div>
                    <div><label>Time</label><select id="recTime"></select></div>
                    <div><label>Shift</label>
                        <div class="radio-group">
                            <label><input type="radio" name="pShift" value="Day" checked> Day</label>
                            <label><input type="radio" name="pShift" value="Night"> Night</label>
                        </div>
                    </div>
                </div>
                <label>BPO Staff ID (WFM ID)</label>
                <input type="text" id="wfmInput" placeholder="Input WFM, please..." style="margin-bottom: 20px;">
                <button class="btn-search" style="width:100%; justify-content:center; background:var(--primary);">CONFIRM</button>
            </div>
            
            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom: 15px;">
                    <div class="info-box"><label>VENDOR</label><div class="info-val" id="v_vendor">-</div></div>
                    <div class="info-box"><label>FULL NAME</label><div class="info-val" id="v_name">-</div></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom: 15px;">
                    <div class="info-box"><label>WFM ID</label><div class="info-val" id="v_id">-</div></div>
                    <div class="info-box"><label>USER WFM ID</label><div class="info-val" id="v_user">-</div></div>
                </div>
                <div class="info-box"><label>WFM EMAIL</label><div class="info-val" id="v_email">-</div></div>
            </div>
        </div>
        <div class="card" style="padding:0;">
            <div class="card-title" style="margin:25px 0 15px 25px;">DATA ENTRY</div>
            <table>
                <thead><tr><th>Scanned At</th><th>Warehouse</th><th>WFM ID</th><th>Full name</th><th>Scan Type</th><th>Status</th></tr></thead>
                <tbody id="recBody">
                    <tr><td colspan="6" style="text-align:center; padding:20px; color:var(--text-gray)">No data scanned yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="request" class="main-content">
        <div class="card">
            <div class="card-title">FILTER DATA REQUEST</div>
            <div style="display: flex; gap: 20px; align-items: flex-end;">
                <div style="flex: 1;"><label>Filter by Date</label><input type="date" id="fDate"></div>
                <div style="flex: 1;"><label>Warehouse</label>
                    <select id="fWH">
                        <option value="ALL">VNDB & VNDL (Tất cả)</option>
                        <option value="VNDB">VNDB</option>
                        <option value="VNDL">VNDL</option>
                    </select>
                </div>
                <div style="flex: 1.2;">
                    <label>Select Team(s)</label>
                    <div class="multiselect">
                        <div class="selectBox" onclick="toggleCheckboxes()">
                            <select><option id="selectedTeamText">Tất cả Team</option></select>
                            <div class="overSelect"></div>
                        </div>
                        <div id="checkboxes">
                            <label><input type="checkbox" class="team-cb" value="Inbound" checked onchange="updateTeamText()">Inbound</label>
                            <label><input type="checkbox" class="team-cb" value="Outbound" checked onchange="updateTeamText()">Outbound</label>
                            <label><input type="checkbox" class="team-cb" value="Inventory" checked onchange="updateTeamText()">Inventory</label>
                            <label><input type="checkbox" class="team-cb" value="FD" checked onchange="updateTeamText()">FD</label>
                            <label><input type="checkbox" class="team-cb" value="Return" checked onchange="updateTeamText()">Return</label>
                        </div>
                    </div>
                </div>
                <button class="btn-search" onclick="searchRequest()"><i class="fas fa-search"></i> Search</button>
            </div>
        </div>
        <div class="card" style="padding:0;">
            <div class="card-title" style="margin:25px 0 15px 25px;">TOTAL VND REQUEST</div>
            <table>
                <thead>
                    <tr><th>Date</th><th>Station</th><th>Vendor</th><th>Team</th><th>Task</th><th>Bắt đầu</th><th>Kết thúc</th><th>Loại CTV</th><th>Booking</th></tr>
                </thead>
                <tbody id="reqBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=915514461&single=true&output=csv';
        let dbMaster = [], expanded = false;

        // CHUYỂN TAB
        function switchTab(t) {
            document.querySelectorAll('.main-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(document.getElementById(t)) document.getElementById(t).classList.add('active');
            if(document.getElementById('m-'+t)) document.getElementById('m-'+t).classList.add('active');
        }

        // LOGIC CHUNG: PARSE CSV CHUẨN (KHÔNG LỆCH CỘT)
        function parseCSV(text) {
            const lines = text.split('\n');
            return lines.map(line => {
                const result = [];
                let current = '', inQuotes = false;
                for (let char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else current += char;
                }
                result.push(current.trim());
                return result;
            });
        }

        // LOGIC RECORDING
        function setScan(m) {
            document.getElementById('btnIn').classList.toggle('active', m==='IN');
            document.getElementById('btnOut').classList.toggle('active', m==='OUT');
        }

        // LOGIC REQUEST (TEAM SELECTION)
        function toggleCheckboxes() {
            let cb = document.getElementById("checkboxes");
            cb.style.display = expanded ? "none" : "block";
            expanded = !expanded;
        }
        function updateTeamText() {
            let checked = Array.from(document.querySelectorAll('.team-cb:checked')).map(c => c.value);
            document.getElementById("selectedTeamText").innerText = checked.length === 0 ? "Chọn Team" : (checked.length === 5 ? "Tất cả Team" : checked.join(", "));
        }

        async function init() {
            try {
                const resp = await fetch(CSV_URL);
                const text = await resp.text();
                dbMaster = parseCSV(text);
                
                const sel = document.getElementById('recTime');
                for(let i=0; i<48; i++) {
                    let h = Math.floor(i/2).toString().padStart(2,'0'), m = (i%2==0?'00':'30');
                    sel.add(new Option(`${h}:${m}`, `${h}:${m}`));
                }
            } catch (e) { console.error("Data Load Error"); }
        }

        function searchRequest() {
            const dVal = document.getElementById('fDate').value;
            const whVal = document.getElementById('fWH').value;
            const teams = Array.from(document.querySelectorAll('.team-cb:checked')).map(c => c.value);
            
            if (!dVal) return alert("Vui lòng chọn ngày!");
            const targetDate = dVal.split('-').reverse().join('/');
            
            const filtered = dbMaster.slice(1).filter(r => {
                if(r.length < 5) return false;
                const matchDate = r[0] === targetDate;
                const matchWH = (whVal === "ALL" || r[1] === whVal);
                const matchTeam = teams.includes(r[3]);
                return matchDate && matchWH && matchTeam;
            });

            const tbody = document.getElementById('reqBody');
            tbody.innerHTML = filtered.length ? '' : '<tr><td colspan="9" style="text-align:center;">Không tìm thấy dữ liệu phù hợp</td></tr>';
            
            filtered.forEach(r => {
                tbody.innerHTML += `<tr>
                    <td>${r[0]}</td><td style="color:var(--primary); font-weight:800">${r[1]}</td>
                    <td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td>
                    <td>${r[8] || ''}</td><td style="font-weight:800; color:#1b2559;">${r[9] || '0'}</td>
                </tr>`;
            });
            if(expanded) toggleCheckboxes();
        }

        window.onload = init;
        window.onclick = function(e) { if (!e.target.closest('.multiselect') && expanded) toggleCheckboxes(); }
    </script>
</body>
</html>
