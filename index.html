<script>
        const SPREADSHEET_ID = '1jE1fj-KGVs0n69XIFVaMGgJeJsssCLWU1awFkCFs35g';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=0`;
        
        let db = [];
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                // Tách dòng và xử lý bỏ dấu ngoặc kép thừa từ Google API
                db = text.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '').trim()));
                document.getElementById('stt').innerText = "🟢 Data Ready";
                document.getElementById('stt').style.color = "#10b981";
            } catch (e) {
                document.getElementById('stt').innerText = "🔴 Lỗi kết nối!";
            }
        }

        document.getElementById('wfmInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const id = this.value.trim();
                if (!id) return;

                // Tìm chính xác dòng chứa ID (quét toàn bộ các cột trên dòng đó)
                const f = db.find(row => row.includes(id));

                if (f) {
                    audio.play();
                    
                    // Lấy dữ liệu theo đúng dòng 'f' đã tìm thấy
                    const vendorVal = f[1] || "-";   // Cột B
                    const nameVal   = f[2] || "-";   // Cột C
                    const userWfmVal = f[8] || "-";  // Cột I

                    // Hiển thị lên các ô thông tin
                    document.getElementById('resID').innerText = id;
                    document.getElementById('resVendor').innerText = vendorVal;
                    document.getElementById('resName').innerText = nameVal;
                    document.getElementById('resUserID').innerText = userWfmVal;
                    document.getElementById('resEmail').innerText = "N/A";

                    // Thêm vào bảng lịch sử phía dưới
                    const pj = document.getElementById('pj').value;
                    const log = `<tr>
                        <td>${new Date().toLocaleTimeString()}</td>
                        <td>${pj}</td>
                        <td>${id}</td>
                        <td>${nameVal}</td>
                        <td style="color:#10b981;font-weight:bold">Success</td>
                    </tr>`;
                    document.getElementById('logList').insertAdjacentHTML('afterbegin', log);
                    
                    this.value = ''; // Xóa ô nhập để sẵn sàng quét mã tiếp theo
                } else { 
                    alert("Không tìm thấy mã: " + id); 
                }
            }
        });
        window.onload = init;
    </script>
