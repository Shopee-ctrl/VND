<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO Recording System - Update Remove</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --green: #10b981; --orange: #ff5722; --red: #ff4d4d; --text-gray: #a3abc1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(77, 68, 255, 0.3); }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); position: relative; margin-bottom: 25px; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 25px; text-transform: uppercase; font-size: 16px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; outline: none; font-size: 14px; font-weight: 600; color: #1b2559; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-gray); font-size: 11px; font-weight: 800; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #1b2559; font-weight: 600; }
        .btn-confirm { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-remove { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-remove:hover { transform: scale(1.2); }
        .tag-in { background: #e6fffa; color: var(--green); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .tag-out { background: #fff5f5; color: #f56565; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .btn-sync-trigger { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; position: absolute; bottom: 20px; right: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" id="m-recording" onclick="switchTab('recording')"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" id="m-request" onclick="switchTab('request')"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item" id="m-fillrate" onclick="switchTab('fillrate')"><i class="fas fa-chart-line"></i> Fill rate</div>
    </div>

    <div id="recording" class="main-content active">
        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px;">
            <div class="card">
                <div class="card-title">INPUT WFM ID</div>
                <input type="text" id="wfmInput" placeholder="Input WFM ID..." autocomplete="off">
                <button class="btn-confirm" onclick="handleConfirm()">CONFIRM</button>
            </div>
            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div id="resName" class="info-box">-</div>
            </div>
        </div>

        <div class="card" style="padding:0; margin-top: 25px;">
            <div class="card-title" style="margin:25px 0 15px 25px;">DATA ENTRY LOGS</div>
            <table>
                <thead>
                    <tr>
                        <th>Time</th><th>Warehouse</th><th>Team</th><th>Vendor</th><th>WFM ID</th><th>Full Name</th><th>Type</th><th>Status</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="logList"></tbody>
            </table>
            <button class="btn-sync-trigger" onclick="syncAllToSheet()">SYNC TO SHEET</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxqOH6q_qiNT71q6kKUDFC1K6laUdbBs19aaXb8ri7kjrGIbhvlN-p5GJCbn273xLfv/exec';
        let localLogs = JSON.parse(localStorage.getItem('BPO_LOGS') || '[]');

        function renderLogs() {
            const tbody = document.getElementById('logList');
            tbody.innerHTML = '';
            localLogs.forEach((log, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${log.time}</td>
                        <td>${log.warehouse}</td>
                        <td>${log.team}</td>
                        <td>${log.vendor}</td>
                        <td>${log.wfmId}</td>
                        <td>${log.fullName}</td>
                        <td><span class="${log.type==='IN'?'tag-in':'tag-out'}">${log.type}</span></td>
                        <td style="color:${log.synced?'var(--green)':'orange'}">${log.synced?'Thành công':'Chờ sync'}</td>
                        <td><button class="btn-remove" onclick="removeLog(${index})"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
            });
        }

        function removeLog(index) {
            if(confirm("Bạn có chắc chắn muốn xóa dòng này không?")) {
                localLogs.splice(index, 1);
                localStorage.setItem('BPO_LOGS', JSON.stringify(localLogs));
                renderLogs();
            }
        }

        async function syncAllToSheet() {
            const unsynced = localLogs.filter(l => !l.synced);
            if(unsynced.length === 0) { alert("Không có dữ liệu mới để sync!"); return; }
            
            for(let log of unsynced) {
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(log), mode: 'no-cors' });
                    log.synced = true;
                } catch (e) { console.error("Sync error", e); }
            }
            localStorage.setItem('BPO_LOGS', JSON.stringify(localLogs));
            renderLogs();
            alert("Đã đồng bộ xong dữ liệu về Google Sheets!");
        }

        // Các hàm switchTab và handleConfirm giữ nguyên logic cũ, chỉ thêm trường synced: false
        function handleConfirm() {
            // Logic lấy dữ liệu staff và tạo object logData...
            // logData.synced = false;
            // localLogs.unshift(logData);
            // renderLogs();
        }

        window.onload = () => { renderLogs(); /* init data... */ };
    </script>
</body>
</html>
