<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO Recording System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --green: #10b981; --orange: #ff5722; --text-gray: #a3abc1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(77, 68, 255, 0.3); }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); position: relative; margin-bottom: 25px; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 25px; text-transform: uppercase; font-size: 16px; }
        
        /* Buttons */
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; background: #f4f7fe; padding: 5px; border-radius: 12px; }
        .btn-scan { flex: 1; padding: 12px; border: none; border-radius: 10px; background: transparent; color: var(--text-gray); font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-scan.active { background: white; color: var(--green); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .btn-confirm { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        .btn-search { background: var(--orange); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; height: 48px; box-shadow: 0 4px 10px rgba(255, 87, 34, 0.2); }

        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; outline: none; font-size: 14px; font-weight: 600; }
        .info-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e0e5f2; font-size: 14px; color: #1b2559; font-weight: 700; min-height: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-gray); font-size: 11px; font-weight: 800; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #1b2559; font-weight: 600; }
        .tag-in { background: #e6fffa; color: var(--green); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .tag-out { background: #fff5f5; color: #f56565; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" id="m-recording" onclick="switchTab('recording')"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" id="m-request" onclick="switchTab('request')"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item"><i class="fas fa-chart-line"></i> Fill rate</div>
    </div>

    <div id="recording" class="main-content active">
        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px;">
            <div class="card">
                <div class="card-title">INPUT WFM ID <span style="color:var(--green); font-size: 10px; margin-left:10px;">🟢 DATA READY</span></div>
                <div class="btn-group">
                    <button class="btn-scan active" id="btnIn" onclick="setScan('IN')"><i class="fas fa-sign-in"></i> SCAN IN</button>
                    <button class="btn-scan" id="btnOut" onclick="setScan('OUT')"><i class="fas fa-sign-out-alt"></i> SCAN OUT</button>
                </div>
                <div class="grid-3">
                    <div><label>Project Code</label>
                        <div style="display:flex; gap:15px; margin-top:10px;">
                            <label><input type="radio" name="pj" value="VNDB" checked> VNDB</label>
                            <label><input type="radio" name="pj" value="VNDL"> VNDL</label>
                        </div>
                    </div>
                    <div><label>Time</label><select id="timeSelect"></select></div>
                    <div><label>Shift</label>
                        <div style="display:flex; gap:15px; margin-top:10px;">
                            <label><input type="radio" name="sh" value="Day" checked> Day</label>
                            <label><input type="radio" name="sh" value="Night"> Night</label>
                        </div>
                    </div>
                </div>
                <label>BPO Staff ID (WFM ID)</label>
                <input type="text" id="wfmInput" placeholder="Input WFM, please..." autocomplete="off">
                <button class="btn-confirm" onclick="handleConfirm()">CONFIRM</button>
            </div>
            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div class="grid-3" style="grid-template-columns: 1fr 1fr;">
                    <div><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                    <div><label>FULL NAME</label><div class="info-box" id="resName">-</div></div>
                    <div><label>WFM ID</label><div class="info-box" id="resID">-</div></div>
                    <div><label>USER WFM ID</label><div class="info-box" id="resUserID">-</div></div>
                </div>
                <label>WFM EMAIL</label><div class="info-box" id="resEmail">-</div>
            </div>
        </div>
        <div class="card" style="padding:0;"><div class="card-title" style="margin:25px 0 15px 25px;">DATA ENTRY LOGS</div>
            <table>
                <thead><tr><th>Scanned At</th><th>Warehouse</th><th>WFM ID</th><th>Full Name</th><th>Scan Type</th><th>Status</th></tr></thead>
                <tbody id="logList"></tbody>
            </table>
        </div>
    </div>

    <div id="request" class="main-content">
        <div class="card">
            <div class="card-title">FILTER DATA REQUEST</div>
            <div style="display: flex; gap: 20px; align-items: flex-end;">
                <div style="flex: 1;"><label>Filter by Date</label><input type="date" id="fDate"></div>
                <div style="flex: 1;"><label>Warehouse</label>
                    <select id="fWH"><option value="ALL">All Warehouse</option><option value="VNDB">VNDB</option><option value="VNDL">VNDL</option></select>
                </div>
                <div style="flex: 1;"><label>Team</label>
                    <select id="fTeam"><option value="ALL">All Teams</option><option value="Inbound">Inbound</option><option value="Inventory">Inventory</option><option value="FD">FD</option><option value="Return">Return</option></select>
                </div>
                <button class="btn-search" onclick="searchRequest()"><i class="fas fa-search"></i> Search</button>
            </div>
        </div>
        <div class="card" style="padding:0;">
            <div class="card-title" style="margin:25px 0 15px 25px;">TOTAL VND REQUEST</div>
            <table>
                <thead><tr><th>Date</th><th>Station</th><th>Vendor</th><th>Team</th><th>Task</th><th>Bắt đầu</th><th>Kết thúc</th><th>Booking</th></tr></thead>
                <tbody id="reqBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const COMMIT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=915514461&single=true&output=csv';
        const STAFF_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv';
        let staffDb = [], commitDb = [], scanMode = "IN";

        function switchTab(t) {
            document.querySelectorAll('.main-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('m-' + t).classList.add('active');
        }

        function setScan(m) {
            scanMode = m;
            document.getElementById('btnIn').classList.toggle('active', m === 'IN');
            document.getElementById('btnOut').classList.toggle('active', m === 'OUT');
        }

        async function init() {
            const [r1, r2] = await Promise.all([fetch(STAFF_URL), fetch(COMMIT_URL)]);
            staffDb = (await r1.text()).split('\n').map(row => row.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
            commitDb = (await r2.text()).split('\n').map(row => row.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
            const sel = document.getElementById('timeSelect');
            for(let i=0; i<48; i++) {
                let h = Math.floor(i/2).toString().padStart(2,'0'), m = (i%2==0?'00':'30');
                sel.add(new Option(`${h}:${m}`, `${h}:${m}`));
            }
        }

        function handleConfirm() {
            const id = document.getElementById('wfmInput').value.trim();
            const s = staffDb.find(r => r[8] === id);
            if(s) {
                document.getElementById('resVendor').innerText = s[1]; document.getElementById('resName').innerText = s[3];
                document.getElementById('resID').innerText = s[8]; document.getElementById('resUserID').innerText = s[9];
                document.getElementById('resEmail').innerText = s[10];
                const now = new Date();
                document.getElementById('logList').insertAdjacentHTML('afterbegin', `<tr><td>${now.getHours()}:${now.getMinutes()} - ${now.toLocaleDateString('vi-VN')}</td><td>${document.querySelector('input[name="pj"]:checked').value}</td><td>${id}</td><td>${s[3]}</td><td><span class="${scanMode==='IN'?'tag-in':'tag-out'}">${scanMode}</span></td><td style="color:var(--green)">Thành công</td></tr>`);
                document.getElementById('wfmInput').value = '';
            } else alert("Sai WFM rồi!");
        }

        function searchRequest() {
            const dVal = document.getElementById('fDate').value;
            const whVal = document.getElementById('fWH').value;
            const tVal = document.getElementById('fTeam').value;
            if (!dVal) { alert("Chọn Ngày đã mày!"); return; }
            const targetDate = dVal.split('-').reverse().join('/');
            const filtered = commitDb.slice(1).filter(r => {
                const mD = (r[0] === targetDate);
                const mW = (whVal === "ALL" || r[1] === whVal);
                const mT = (tVal === "ALL" || r[3] === tVal);
                return mD && mW && mT;
            });
            const tbody = document.getElementById('reqBody');
            tbody.innerHTML = filtered.length ? '' : '<tr><td colspan="8" style="text-align:center;">No Data Found</td></tr>';
            filtered.forEach(r => {
                tbody.innerHTML += `<tr><td>${r[0]}</td><td style="color:var(--primary)">${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td style="color:var(--primary)">${r[5]}</td><td style="color:#f56565">${r[6]}</td><td style="font-weight:800">${r[7]}</td></tr>`;
            });
        }

        window.onload = init;
        document.getElementById('wfmInput').onkeypress = (e) => { if(e.key === 'Enter') handleConfirm(); };
    </script>
</body>
</html>
