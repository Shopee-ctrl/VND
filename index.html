<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO System - Full Data Source</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --orange: #ff5722; --text-gray: #a3abc1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); font-size: 14px; margin: 5px 15px; border-radius: 12px; cursor: pointer; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 25px; text-transform: uppercase; font-size: 16px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; outline: none; font-size: 14px; font-weight: 600; color: #1b2559; background: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--text-gray); font-size: 11px; font-weight: 800; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 13px; color: #1b2559; font-weight: 600; }
        .btn-search { background: var(--orange); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; height: 48px; display: flex; align-items: center; gap: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active"><i class="fas fa-wallet"></i> Total VND Request</div>
    </div>

    <div class="main-content">
        <div class="card">
            <div class="card-title">FILTER DATA</div>
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;"><label>Date</label><input type="date" id="fDate"></div>
                <div style="flex: 1;"><label>Warehouse</label>
                    <select id="fWH">
                        <option value="ALL">VNDB & VNDL</option>
                        <option value="VNDB">VNDB</option>
                        <option value="VNDL">VNDL</option>
                    </select>
                </div>
                <button class="btn-search" onclick="searchRequest()">SEARCH</button>
            </div>
        </div>

        <div class="card" style="padding:0;">
            <div class="card-title" style="margin:25px 0 15px 25px;">DATA SOURCE (A -> J)</div>
            <table>
                <thead>
                    <tr>
                        <th>Date (A)</th>
                        <th>Station (B)</th>
                        <th>Vendor (C)</th>
                        <th>Team (D)</th>
                        <th>Task (E)</th>
                        <th>Bắt đầu (F)</th>
                        <th>Kết thúc (G)</th>
                        <th>Cột H</th>
                        <th>Loại CTV (I)</th>
                        <th>Booking (J)</th>
                    </tr>
                </thead>
                <tbody id="reqBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const COMMIT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=915514461&single=true&output=csv';
        let rawData = [];

        async function init() {
            const resp = await fetch(COMMIT_URL);
            const text = await resp.text();
            // Xử lý CSV chuẩn hơn để không bị lệch cột khi có ô trống
            rawData = text.split('\n').map(row => {
                // Regex này giúp split dấu phẩy nhưng bỏ qua phẩy nằm trong ngoặc kép (nếu có)
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
            });
        }

        function searchRequest() {
            const dVal = document.getElementById('fDate').value;
            const whVal = document.getElementById('fWH').value;
            if (!dVal) return alert("Chọn ngày!");

            const targetDate = dVal.split('-').reverse().join('/');
            const tbody = document.getElementById('reqBody');
            tbody.innerHTML = '';

            // Duyệt từ dòng 2 (bỏ header)
            for (let i = 1; i < rawData.length; i++) {
                let r = rawData[i];
                if (r.length < 5) continue;

                const matchDate = r[0] === targetDate;
                const isVND = (r[1] === "VNDL" || r[1] === "VNDB");
                const matchWH = (whVal === "ALL" || r[1] === whVal);

                if (matchDate && isVND && matchWH) {
                    let tr = document.createElement('tr');
                    // Đổ đúng thứ tự r[0] đến r[9] tương ứng A đến J
                    tr.innerHTML = `
                        <td>${r[0] || ''}</td>
                        <td style="color:var(--primary)">${r[1] || ''}</td>
                        <td>${r[2] || ''}</td>
                        <td>${r[3] || ''}</td>
                        <td>${r[4] || ''}</td>
                        <td>${r[5] || ''}</td>
                        <td>${r[6] || ''}</td>
                        <td>${r[7] || ''}</td>
                        <td>${r[8] || ''}</td>
                        <td style="font-weight:bold; color:black;">${r[9] || '0'}</td>
                    `;
                    tbody.appendChild(tr);
                }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
