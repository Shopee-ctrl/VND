<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --text-gray: #a3abc1; --danger: #ff5252; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; position: relative; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; font-size: 14px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; font-weight: 600; color: #1b2559; box-sizing: border-box; margin-bottom: 10px; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-del { color: var(--danger); border: none; background: none; cursor: pointer; font-size: 18px; }
        .btn-download { background: #2ecc71; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 12px; color: var(--text-gray); font-size: 10px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 12px; color: #1b2559; font-weight: 600; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e0e5f2; font-weight: bold; min-height: 22px; color: #1b2559; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="switchTab('recording', this)"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item" onclick="switchTab('database', this)"><i class="fas fa-database"></i> BPO Database</div>
    </div>

    <div id="recording" class="main-content active">
        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px;">
            <div class="card">
                <div class="card-title">INPUT WFM ID</div>
                <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:12px;">
                    <div style="grid-column: span 2;"><label>DATE SYNC</label><input type="date" id="inputDate" onchange="loadSharedDB()"></div>
                    <div><label>WH</label><select id="wh"><option>VNDB</option><option>VNDL</option></select></div>
                    <div><label>TEAM</label><select id="team"><option>Inbound</option><option>Inventory</option><option>FD</option><option>OB</option></select></div>
                    <div><label>TIME</label><select id="time"></select></div>
                    <div><label>SHIFT</label><select id="shift"><option>Day</option><option>Night</option></select></div>
                </div>
                <input type="text" id="wfmInput" placeholder="Nhập mã WFM..." onkeypress="if(event.key==='Enter') handleConfirm()">
                <button class="btn-search" style="width:100%" onclick="handleConfirm()">CONFIRM</button>
            </div>
            <div class="card">
                <div class="card-title">INFO</div>
                <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:12px;">
                    <div><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                    <div><label>NAME</label><div class="info-box" id="resName">-</div></div>
                </div>
                <label>ID</label><div class="info-box" id="resID" style="width: 50%;">-</div>
                <label>EMAIL</label><div class="info-box" id="resEmail">-</div>
                <label>STATUS UPDATE</label><div class="info-box" id="resStatus">READY</div>
            </div>
        </div>
        <div class="card" style="padding:0; min-height:350px;">
            <table>
                <thead>
                    <tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>ID</th><th>NAME</th><th style="text-align:center">ACTION</th><th>STATUS</th></tr>
                </thead>
                <tbody id="logList"></tbody>
            </table>
        </div>
    </div>

    <div id="request" class="main-content">
        <div class="card">
            <div class="card-title">FILTER DATA REQUEST</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: flex-end;">
                <div><label>Date</label><input type="date" id="reqDate"></div>
                <div><label>Warehouse</label><select id="reqWh"><option value="All">All WH</option><option>VNDB</option><option>VNDL</option></select></div>
                <div><label>Team</label><select id="reqTeam"><option value="All">All Team</option><option>Inbound</option><option>Inventory</option><option>FD</option><option>OB</option></select></div>
                <button class="btn-search" onclick="loadRequestData()">SEARCH</button>
            </div>
        </div>
        <div class="card" style="padding:0;">
            <table>
                <thead><tr><th>Date</th><th>WH</th><th>Vendor</th><th>Team</th><th>Task</th><th>WFM ID</th><th>User ID</th></tr></thead>
                <tbody id="reqBody"></tbody>
            </table>
        </div>
    </div>

    <div id="database" class="main-content">
        <div class="card">
            <div class="card-title">BPO MASTER DATABASE</div>
            <div style="display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 15px; align-items: flex-end;">
                <div><label>Date Filter</label><input type="date" id="dbDate"></div>
                <button class="btn-search" onclick="loadSharedDB()">REFRESH</button>
                <button class="btn-download" onclick="downloadDB()"><i class="fas fa-download"></i> DOWNLOAD CSV</button>
            </div>
        </div>
        <div class="card" style="padding:0;">
            <table>
                <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>WFM ID</th><th>FULL NAME</th></tr></thead>
                <tbody id="masterBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyirSDM_urj6OFB7jnA4m0CSEQa_GKv5fnWZmmml4R3u8fE1z9PxEAKQpBSXSv7P-Q/exec';
        const CSV_PT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv';
        const CSV_COMMIT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=915514461&single=true&output=csv';

        let dataPT = [], dataCommit = [], masterData = [];

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputDate').value = today;
            document.getElementById('reqDate').value = today;
            document.getElementById('dbDate').value = today;
            fillTime(); preloadData(); loadSharedDB();
        };

        function fillTime() {
            const sel = document.getElementById('time');
            for(let i=0; i<48; i++) {
                let h = Math.floor(i/2).toString().padStart(2,'0'), m = i%2==0?'00':'30';
                sel.add(new Option(`${h}:${m}`, `${h}:${m}`));
            }
        }

        async function preloadData() {
            const [r1, r2] = await Promise.all([fetch(CSV_PT_URL), fetch(CSV_COMMIT_URL)]);
            const t1 = await r1.text(), t2 = await r2.text();
            dataPT = t1.split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            dataCommit = t2.split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
        }

        async function handleConfirm() {
            const id = document.getElementById('wfmInput').value.trim().toUpperCase();
            const found = dataPT.find(r => r[8] && r[8].toUpperCase() === id);
            if(found) {
                const log = {
                    date: document.getElementById('inputDate').value,
                    time: document.getElementById('time').value,
                    wh: document.getElementById('wh').value,
                    team: document.getElementById('team').value,
                    vendor: found[1],
                    wfmId: found[8],
                    name: found[3],
                    email: found[10]
                };
                document.getElementById('resName').innerText = log.name;
                document.getElementById('resVendor').innerText = log.vendor;
                document.getElementById('resID').innerText = log.wfmId;
                document.getElementById('resEmail').innerText = log.email;
                document.getElementById('resStatus').innerText = "SAVING...";

                const params = new URLSearchParams(log);
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
                document.getElementById('wfmInput').value = "";
                document.getElementById('resStatus').innerText = "DONE!";
                await loadSharedDB();
            }
        }

        async function loadSharedDB() {
            try {
                const res = await fetch(SCRIPT_URL);
                masterData = await res.json();
                renderLogs();
                renderMaster();
            } catch(e) { console.error("Sync Error"); }
        }

        function renderLogs() {
            const target = document.getElementById('inputDate').value;
            const filtered = masterData.filter(r => r.date === target);
            document.getElementById('logList').innerHTML = filtered.map(l => `
                <tr>
                    <td>${l.date}</td><td>${l.time}</td><td>${l.wh}</td><td>${l.team}</td><td>${l.vendor}</td><td>${l.wfmId}</td><td>${l.name}</td>
                    <td style="text-align:center"><button class="btn-del"><i class="fas fa-trash-can"></i></button></td>
                    <td style="color:green">OK</td>
                </tr>`).join('');
        }

        function renderMaster() {
            const target = document.getElementById('dbDate').value;
            const filtered = masterData.filter(r => r.date === target);
            document.getElementById('masterBody').innerHTML = filtered.map(r => `<tr><td>${r.date}</td><td>${r.time}</td><td>${r.wh}</td><td>${r.team}</td><td>${r.vendor}</td><td>${r.wfmId}</td><td>${r.name}</td></tr>`).join('');
        }

        function loadRequestData() {
            const dVal = document.getElementById('reqDate').value;
            const whVal = document.getElementById('reqWh').value;
            const teamVal = document.getElementById('reqTeam').value;
            const [y, m, d] = dVal.split('-');
            const dateStr = `${parseInt(d)}/${parseInt(m)}/${y}`;
            const filtered = dataCommit.filter(r => {
                const matchDate = r[0] === dateStr || r[0] === `${d}/${m}/${y}`;
                const matchWh = whVal === "All" || r[1] === whVal;
                const matchTeam = teamVal === "All" || r[3] === teamVal;
                return matchDate && matchWh && matchTeam;
            });
            document.getElementById('reqBody').innerHTML = filtered.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[8]}</td><td>${r[9]}</td></tr>`).join('');
        }

        function downloadDB() {
            if(masterData.length === 0) return alert("Bấm REFRESH trước!");
            let csv = "\uFEFFDATE,TIME,WH,TEAM,VENDOR,WFM ID,NAME\n";
            masterData.forEach(r => csv += `"${r.date}","${r.time}","${r.wh}","${r.team}","${r.vendor}","${r.wfmId}","${r.name}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `BPO_Export_${document.getElementById('dbDate').value}.csv`;
            link.click();
        }

        function switchTab(t, el) {
            document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
