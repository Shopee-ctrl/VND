<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO Recording System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a1c3d; --bg: #f4f7fe; --blue: #4d44ff; --text: #4a5568; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #2b26c1; color: white; padding: 20px 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid white; }
        .nav-item i { margin-right: 15px; width: 20px; }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); position: relative; }
        .card-title { font-weight: bold; color: #1a1c3d; border-left: 4px solid #4d44ff; padding-left: 12px; margin-bottom: 20px; font-size: 18px; }
        #stt { position: absolute; top: 25px; right: 25px; font-size: 12px; font-weight: bold; }
        .scan-btns { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-in { color: #10b981; border-color: #d1fae5; }
        .btn-out { color: #a0aec0; background: #f8fafc; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #1a1c3d; margin-bottom: 8px; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #edf2f7; min-height: 18px; font-size: 14px; font-weight: 500; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; outline: none; }
        .radio-group { display: flex; gap: 15px; align-items: center; padding-top: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { text-align: left; padding: 15px; color: #a0aec0; font-size: 12px; border-bottom: 1px solid #edf2f7; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f7fafc; font-size: 14px; color: #4a5568; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="#" class="nav-item active"><i class="fas fa-microphone"></i> Recording BPO PT</a>
        <a href="#" class="nav-item"><i class="fas fa-wallet"></i> Total VND Request</a>
        <a href="#" class="nav-item"><i class="fas fa-chart-line"></i> Fill rate</a>
    </div>
    <div class="main">
        <div class="container">
            <div class="card">
                <div class="card-title">INPUT WFM ID</div>
                <div id="stt" style="color: #e74c3c;">Connecting...</div>
                <div class="scan-btns">
                    <button class="btn btn-in"><i class="fas fa-sign-in-alt"></i> SCAN IN</button>
                    <button class="btn btn-out"><i class="fas fa-sign-out-alt"></i> SCAN OUT</button>
                </div>
                <div class="grid-3">
                    <div class="input-group">
                        <label>Project Code</label>
                        <div class="radio-group">
                            <label style="font-weight: normal;"><input type="radio" name="pj" value="VNDB" checked> VNDB</label>
                            <label style="font-weight: normal;"><input type="radio" name="pj" value="VNDL"> VNDL</label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Time</label>
                        <select id="timeSelect"><option>09:00</option></select>
                    </div>
                    <div class="input-group">
                        <label>Shift</label>
                        <div class="radio-group">
                            <label style="font-weight: normal;"><input type="radio" name="shift" value="Day" checked> Day</label>
                            <label style="font-weight: normal;"><input type="radio" name="shift" value="Night"> Night</label>
                        </div>
                    </div>
                </div>
                <label>BPO Staff ID (WFM ID)</label>
                <input type="text" id="wfmInput" placeholder="Input WFM, please..." autocomplete="off">
            </div>
            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div class="grid-3" style="grid-template-columns: 1fr 1fr;">
                    <div class="input-group"><label>VENDOR</label><div class="info-box" id="resVendor">-</div></div>
                    <div class="input-group"><label>FULL NAME</label><div class="info-box" id="resName">-</div></div>
                </div>
                <div class="grid-3" style="grid-template-columns: 1fr 1fr;">
                    <div class="input-group"><label>WFM ID</label><div class="info-box" id="resID">-</div></div>
                    <div class="input-group"><label>USER WFM ID</label><div class="info-box" id="resUserID">-</div></div>
                </div>
                <div class="input-group"><label>WFM EMAIL</label><div class="info-box" id="resEmail">-</div></div>
            </div>
        </div>
        <div class="card" style="padding: 0;">
            <div class="card-title" style="margin: 25px 0 0 25px;">DATA ENTRY</div>
            <table>
                <thead><tr><th>Scanned At</th><th>Warehouse</th><th>WFM ID</th><th>Full name</th><th>Scan Type</th><th>Status</th></tr></thead>
                <tbody id="logList"></tbody>
            </table>
        </div>
    </div>
    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTj_oKLgnuBywkM3yef66KdvHfhYD1pAslJW76vbVWBnaZTCPl13XHgto9Op_-AkTjPAbvPPA0yE6rk/pub?gid=0&single=true&output=csv';
        let database = [];
        const ting = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                database = text.split('\n').filter(l => l.trim()).map(r => r.split(',').map(c => c.trim()));
                document.getElementById('stt').innerText = "Data Ready";
                document.getElementById('stt').style.color = "#2ecc71";
            } catch (e) { document.getElementById('stt').innerText = "Lỗi kết nối!"; }
        }

        document.getElementById('wfmInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const id = this.value.trim();
                const f = database.find(r => r[0] === id);
                if (f) {
                    ting.play();
                    document.getElementById('resID').innerText = f[0] || "-";
                    document.getElementById('resVendor').innerText = f[1] || "-";
                    document.getElementById('resName').innerText = f[2] || "-";
                    document.getElementById('resUserID').innerText = f[3] || "-";
                    document.getElementById('resEmail').innerText = f[4] || "-";
                    const pj = document.querySelector('input[name="pj"]:checked').value;
                    const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${pj}</td><td>${f[0]}</td><td>${f[2]}</td><td>IN</td><td style="color:#10b981; font-weight:bold">Success</td></tr>`;
                    document.getElementById('logList').insertAdjacentHTML('afterbegin', row);
                    this.value = '';
                } else { alert("Không tìm thấy!"); }
            }
        });
        window.onload = init;
    </script>
</body>
</html>
