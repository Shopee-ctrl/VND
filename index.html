<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO PT SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: var(--sidebar); color: white; padding-top: 20px; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: rgba(255,255,255,0.7); display: flex; align-items: center; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 15px; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; border-bottom: 1px solid #eee; color: #a3abc1; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 13px; font-weight: 600; color: #1b2559; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .info-box { background: #f4f7fe; padding: 10px; border-radius: 8px; min-height: 20px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="switchTab('recording', this)"><i class="fas fa-edit"></i> Recording</div>
        <div class="nav-item" onclick="switchTab('database', this)"><i class="fas fa-database"></i> Database</div>
    </div>

    <div id="recording" class="main-content active">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card">
                <label>DATE</label><input type="date" id="inputDate">
                <label>WH</label><select id="wh"><option>VNDB</option><option>VNDL</option></select>
                <label>TIME</label><select id="time"></select>
                <label>WFM ID</label><input type="text" id="wfmInput" onkeypress="if(event.key==='Enter') handleConfirm()">
                <button class="btn" style="width:100%" onclick="handleConfirm()">CONFIRM</button>
            </div>
            <div class="card">
                <label>NAME</label><div class="info-box" id="resName">-</div>
                <label>VENDOR</label><div class="info-box" id="resVendor">-</div>
            </div>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>VENDOR</th><th>NAME</th><th>STATUS</th></tr></thead>
                <tbody id="logList"></tbody>
            </table>
            <button class="btn" style="background: #ff5252; margin-top: 15px;" onclick="syncToSheet()">SYNC TO SHEET</button>
        </div>
    </div>

    <div id="database" class="main-content">
        <div class="card">
            <input type="date" id="dbDate" style="width: 200px;">
            <button class="btn" onclick="loadSharedDB()">REFRESH</button>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>DATE</th><th>TIME</th><th>WH</th><th>TEAM</th><th>VENDOR</th><th>WFM ID</th><th>NAME</th></tr></thead>
                <tbody id="masterBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzf1G1CgxgB09JPXn3bdsitf63leW0zXlARp3GiTF6wjTLTUHJOWaSvnWmjyidmx8ab/exec';
        const CSV_PT_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBb-hERkDWpd9_BufMG0ZK2idUC5e76qCz7wk96ybqHbrnrG1_xylG3JGWu0Vjor-DKNB1v2uCEG2C/pub?gid=0&single=true&output=csv';

        let dataPT = [], logs = JSON.parse(localStorage.getItem('bpo_logs')) || [];

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inputDate').value = today;
            document.getElementById('dbDate').value = today;
            fillTime(); renderLogs(); preloadData();
        };

        function fillTime() {
            const sel = document.getElementById('time');
            for(let i=0; i<48; i++) {
                let h = Math.floor(i/2).toString().padStart(2,'0'), m = i%2==0?'00':'30';
                sel.add(new Option(`${h}:${m}`, `${h}:${m}`));
            }
        }

        async function preloadData() {
            const res = await fetch(CSV_PT_URL);
            const text = await res.text();
            dataPT = text.split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
        }

        function handleConfirm() {
            const id = document.getElementById('wfmInput').value.trim().toUpperCase();
            const found = dataPT.find(r => r[8] && r[8].toUpperCase() === id);
            if(found) {
                document.getElementById('resName').innerText = found[3];
                document.getElementById('resVendor').innerText = found[1];
                logs.unshift({ date: document.getElementById('inputDate').value, time: document.getElementById('time').value, wh: document.getElementById('wh').value, team: 'Inventory', vendor: found[1], wfmId: found[8], name: found[3], email: found[10], synced: false });
                localStorage.setItem('bpo_logs', JSON.stringify(logs));
                renderLogs();
            }
        }

        function renderLogs() {
            document.getElementById('logList').innerHTML = logs.map(l => `<tr><td>${l.date}</td><td>${l.time}</td><td>${l.wh}</td><td>${l.vendor}</td><td>${l.name}</td><td style="color:${l.synced?'green':'orange'}">${l.synced?'OK':'Wait'}</td></tr>`).join('');
        }

        async function syncToSheet() {
            const pending = logs.filter(l => !l.synced);
            for(let l of pending) {
                const params = new URLSearchParams(l);
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
                l.synced = true;
            }
            localStorage.setItem('bpo_logs', JSON.stringify(logs));
            renderLogs();
            alert("Sync thành công!");
        }

        async function loadSharedDB() {
            const target = document.getElementById('dbDate').value;
            const body = document.getElementById('masterBody');
            body.innerHTML = '<tr><td colspan="7">Loading...</td></tr>';
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                // Lọc data theo ngày được chọn
                const filtered = data.filter(r => r.date === target);
                body.innerHTML = filtered.map(r => `<tr><td>${r.date}</td><td>${r.time}</td><td>${r.wh}</td><td>${r.team}</td><td>${r.vendor}</td><td>${r.wfmId}</td><td>${r.name}</td></tr>`).join('') || '<tr><td colspan="7">Trống</td></tr>';
            } catch(e) { body.innerHTML = '<tr><td colspan="7">Lỗi kết nối!</td></tr>'; }
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'database') loadSharedDB();
        }
    </script>
</body>
</html>
