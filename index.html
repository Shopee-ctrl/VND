<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO Recording System - FINAL FIX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #2b26c1; --bg: #f4f7fe; --blue: #4d44ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid white; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-weight: bold; color: #1a1c3d; border-left: 4px solid var(--blue); padding-left: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #1a1c3d; margin-bottom: 5px; text-transform: uppercase; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; min-height: 20px; font-size: 14px; color: #333; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #4d44ff; border-radius: 8px; outline: none; box-sizing: border-box; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: #a0aec0; font-size: 11px; border-bottom: 1px solid #f1f5f9; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 13px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active"><i class="fas fa-microphone"></i> Recording BPO PT</div>
    </div>
    <div class="main">
        <div class="container">
            <div class="card">
                <div class="card-title">NHẬP MÃ QH (CỘT A) <span id="stt" style="color:#e74c3c;">🔴 Đang kết nối...</span></div>
                <input type="text" id="wfmInput" placeholder="Ví dụ: SPAGR01027..." autocomplete="off">
            </div>
            <div class="card">
                <div class="card-title">THÔNG TIN NHÂN VIÊN</div>
                <div class="grid-inputs">
                    <div><label>VENDOR (Cột B)</label><div class="info-box" id="resVendor">-</div></div>
                    <div><label>FULL NAME (Cột D)</label><div class="info-box" id="resName">-</div></div>
                </div>
                <div class="grid-inputs">
                    <div><label>WFM ID (Cột I)</label><div class="info-box" id="resID">-</div></div>
                    <div><label>USER WFM ID (Cột J)</label><div class="info-box" id="resUserID">-</div></div>
                </div>
                <label>WFM EMAIL (Cột K)</label><div class="info-box" id="resEmail">-</div>
            </div>
        </div>
        <div class="card" style="padding:0;">
            <table id="logTable">
                <thead><tr><th>Time</th><th>Mã QH</th><th>Họ Tên</th><th>Trạng thái</th></tr></thead>
                <tbody id="logList"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1jE1fj-KGVs0n69XIFVaMGgJeJsssCLWU1awFkCFs35g';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=0&t=${new Date().getTime()}`;
        
        let db = [];
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                // Tách dòng và xử lý xóa dấu ngoặc kép
                db = text.split('\n').map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim())
                );
                document.getElementById('stt').innerText = "🟢 Sẵn sàng";
                document.getElementById('stt').style.color = "#10b981";
            } catch (e) {
                document.getElementById('stt').innerText = "🔴 Lỗi kết nối!";
            }
        }

        document.getElementById('wfmInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const searchCode = this.value.trim();
                if (!searchCode) return;

                // Tìm dòng mà Cột A (index 0) khớp với mã nhập vào
                const f = db.find(row => row[0] === searchCode);

                if (f) {
                    audio.play();
                    // Mapping chính xác theo ảnh Sheets của ông
                    document.getElementById('resVendor').innerText = f[1] || "-";  // Cột B
                    document.getElementById('resName').innerText   = f[3] || "-";  // Cột D
                    document.getElementById('resID').innerText     = f[8] || "-";  // Cột I
                    document.getElementById('resUserID').innerText = f[9] || "-";  // Cột J
                    document.getElementById('resEmail').innerText  = f[10] || "-"; // Cột K

                    const log = `<tr>
                        <td>${new Date().toLocaleTimeString()}</td>
                        <td>${searchCode}</td>
                        <td>${f[3]}</td>
                        <td style="color:#10b981;font-weight:bold">Thành công</td>
                    </tr>`;
                    document.getElementById('logList').insertAdjacentHTML('afterbegin', log);
                    this.value = '';
                } else {
                    alert("Không tìm thấy Mã QH: " + searchCode);
                }
            }
        });
        window.onload = init;
    </script>
</body>
</html>
