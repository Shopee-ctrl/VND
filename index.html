<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BPO System - Final Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #13163a; --bg: #f4f7fe; --primary: #4d44ff; --text-gray: #a3abc1; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding-top: 20px; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: rgba(255,255,255,0.7); margin: 5px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: none; }
        .main-content.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin-bottom: 25px; position: relative; }
        .card-title { font-weight: bold; color: #1b2559; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; text-transform: uppercase; font-size: 14px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #1b2559; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e5f2; border-radius: 12px; font-weight: 600; color: #1b2559; box-sizing: border-box; margin-bottom: 10px; }
        .btn-confirm { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-sync { background: #ff5252; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; position: absolute; bottom: 20px; right: 25px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { text-align: left; padding: 12px; color: var(--text-gray); font-size: 10px; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f8fafc; font-size: 12px; color: #1b2559; font-weight: 600; }
        .info-box { background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e0e5f2; font-weight: bold; min-height: 22px; color: #1b2559; margin-bottom: 10px; }
        .multiselect { position: relative; width: 100%; }
        .selectBox { position: relative; }
        .overSelect { position: absolute; left: 0; right: 0; top: 0; bottom: 0; }
        #checkboxes { display: none; border: 1px solid #e0e5f2; position: absolute; background-color: white; width: 100%; z-index: 10; border-radius: 12px; padding: 5px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #checkboxes label { display: block; padding: 8px; text-transform: none; font-size: 13px; cursor: pointer; color: #1b2559; font-weight: 600; }
        .table-wrapper { overflow-x: auto; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="switchTab('recording', this)"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item" onclick="switchTab('request', this)"><i class="fas fa-wallet"></i> Total VND Request</div>
    </div>

    <div id="recording" class="main-content active">
        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px;">
            <div class="card">
                <div class="card-title">INPUT WFM ID</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div><label>Warehouse</label><select id="wh"><option>VNDB</option><option>VNDL</option></select></div>
                    <div><label>Team</label><select id="team"><option>Inventory</option><option>Inbound</option><option>FD</option><option>OB</option></select></div>
                    <div><label>Time</label><select id="time"></select></div>
                    <div><label>Shift</label><select id="shift"><option>Day</option><option>Night</option></select></div>
                </div>
                <label>BPO Staff ID (WFM ID)</label>
                <input type="text" id="wfmInput" placeholder="Input WFM ID..." onkeypress="if(event.key==='Enter') handleConfirm()">
                <button class="btn-confirm" onclick="handleConfirm()">CONFIRM</button>
            </div>
            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                    <div><label>Vendor</label><div class="info-box" id="resVendor">-</div></div>
                    <div><label>Full Name</label><div class="info-box" id="resName">-</div></div>
                    <div><label>WFM ID</label><div class="info-box" id="resID">-</div></div>
                    <div><label>User WFM ID</label><div class="info-box" id="resUserID">-</div></div>
                </div>
                <label>WFM Email</label><div class="info-box" id="resEmail">-</div>
            </div>
        </div>
        <div class="card" style="padding:0; min-height:350px;">
            <div class="card-title" style="margin:25px 0 15px 25px;">DATA ENTRY LOGS</div>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Time</th><th>WH</th><th>Team</th><th>Vendor</th><th>WFM ID</th><th>Full Name</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="logList"></tbody>
                </table>
            </div>
            <button class="btn-sync" onclick="syncToSheet()">SYNC TO SHEET</button>
        </div>
    </div>

    <div id="request" class="main-content">
        <div class="card">
            <div class="card-title">FILTER DATA REQUEST</div>
            <div style="display: grid; grid-template-columns: 1.2fr 1fr 1fr 100px; gap: 15px; align-items: flex-end;">
                <div><label>Date</label><input type="date" id="reqDate" value="2026-03-26"></div>
                <div><label>Warehouse</label>
                    <div class="multiselect">
                        <div class="selectBox" onclick="showCheckboxes()"><select><option id="whLabel">Tất cả kho</option></select><div class="overSelect"></div></div>
                        <div id="checkboxes">
                            <label><input type="checkbox" value="VNDB" onchange="updateLabel()"> VNDB</label>
                            <label><input type="checkbox" value="VNDL" onchange="updateLabel()"> VNDL</label>
                            <label><input type="checkbox" value="VNN" onchange="updateLabel()"> VNN</label>
                        </div>
                    </div>
                </div>
                <div><label>Team</label><select id="reqTeam"><option value="All">All Team</option><option>Inventory</option><option>Inbound</option><option>FD</option><option>OB</option></select></div>
                <button class="btn-search" onclick="loadRequestData()">SEARCH</button>
            </div>
        </div>
        <div class="card" style="padding:0;">
            <div class="card-title" style="margin:25px 0 15px 25px;">TOTAL VND REQUEST</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th><th>Station</th><th>Vendors</th><th>Team</th><th>Task</th>
                            <th>Bắt đầu</th><th>Kết thúc</th><th>Loại CTV</th><th>WFM Booking</th>
                        </tr>
                    </thead>
                    <tbody id="reqBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwp1UEjOuWEaiCrx_BwjGnJRE9cOZLHHD1nBl6ANg4el5cuOHWH-XH-p5uHoBhQ9m4/exec';
        let logs = JSON.parse(localStorage.getItem('bpo_logs')) || [];
        let rawDataCache = [];

        window.onload = () => { render(); fillTime(); preloadData(); };

        function fillTime() {
            const tSel = document.getElementById('time');
            for(let i=0; i<48; i++) {
                let h = Math.floor(i/2).toString().padStart(2,'0'), m = i%2==0?'00':'30';
                tSel.add(new Option(`${h}:${m}`, `${h}:${m}`));
            }
        }

        function formatVal(val, isTime = false) {
            if(!val) return "-";
            if(typeof val === 'string' && val.includes('T')) {
                const d = new Date(val);
                if(!isNaN(d)) {
                    if(isTime) return d.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit', hour12: false});
                    // Sửa định dạng ngày hiển thị dd/mm/yyyy
                    return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
                }
            }
            return val;
        }

        function handleConfirm() {
            const id = document.getElementById('wfmInput').value.trim();
            if(!id) return;
            const item = { time: document.getElementById('time').value, wh: document.getElementById('wh').value, team: document.getElementById('team').value, vendor: "Agari", wfmId: id, name: "TRẦN BÙI ANH BẢO", type: "IN", synced: false };
            logs.unshift(item);
            localStorage.setItem('bpo_logs', JSON.stringify(logs));
            document.getElementById('resUserID').innerText = id;
            render();
            document.getElementById('wfmInput').value = "";
        }

        function render() {
            document.getElementById('logList').innerHTML = logs.map((l, i) => `
                <tr><td>${l.time}</td><td>${l.wh}</td><td>${l.team}</td><td>${l.vendor}</td><td>${l.wfmId}</td><td>${l.name}</td>
                <td style="color:${l.synced?'#10b981':'orange'}">${l.synced?'Thành công':'Chờ Sync'}</td>
                <td><i class="fas fa-trash" style="color:red;cursor:pointer" onclick="logs.splice(${i},1);localStorage.setItem('bpo_logs',JSON.stringify(logs));render()"></i></td></tr>`).join('');
        }

        async function syncToSheet() {
            const pending = logs.filter(l => !l.synced);
            if(!pending.length) return alert("Không có data mới!");
            try {
                for(let l of pending) {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(l) });
                    l.synced = true;
                }
                localStorage.setItem('bpo_logs', JSON.stringify(logs));
                render();
                alert("Đã đồng bộ lên DATA PT!"); 
            } catch(e) { alert("Lỗi kết nối!"); }
        }

        async function preloadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                rawDataCache = await res.json();
            } catch(e) { console.log("Cache failed"); }
        }

        function loadRequestData() {
            const tbody = document.getElementById('reqBody');
            const dateF = document.getElementById('reqDate').value; // YYYY-MM-DD từ input
            const whs = Array.from(document.querySelectorAll('#checkboxes input:checked')).map(i => i.value);
            const teamF = document.getElementById('reqTeam').value;

            const filtered = rawDataCache.filter(r => {
                // FIX TRIỆT ĐỂ LỖI NGÀY: So khớp chính xác chuỗi YYYY-MM-DD
                const dObj = new Date(r[0]);
                const rDateStr = dObj.getFullYear() + '-' + String(dObj.getMonth() + 1).padStart(2, '0') + '-' + String(dObj.getDate()).padStart(2, '0');
                
                const matchDate = !dateF || rDateStr === dateF;
                const matchWh = whs.length === 0 || whs.includes(r[1]);
                const matchTeam = teamF === 'All' || r[3] === teamF;
                return matchDate && matchWh && matchTeam;
            });

            // Hiển thị 9 cột (bỏ cột H trống)
            tbody.innerHTML = filtered.map(r => `
                <tr>
                    <td>${formatVal(r[0])}</td>
                    <td>${r[1] || ''}</td>
                    <td>${r[2] || ''}</td>
                    <td>${r[3] || ''}</td>
                    <td>${r[4] || ''}</td>
                    <td>${formatVal(r[5], true)}</td>
                    <td>${formatVal(r[6], true)}</td>
                    <td>${r[8] || ''}</td>
                    <td>${r[9] || ''}</td>
                </tr>`).join('') || '<tr><td colspan="9" style="text-align:center;">Không có data khớp bộ lọc</td></tr>';
        }

        let expanded = false;
        function showCheckboxes() { const cb = document.getElementById("checkboxes"); cb.style.display = expanded ? "none" : "block"; expanded = !expanded; }
        function updateLabel() {
            const checked = Array.from(document.querySelectorAll('#checkboxes input:checked')).map(i => i.value);
            document.getElementById("whLabel").innerText = checked.length ? checked.join(', ') : "Tất cả kho";
        }
        function switchTab(t, el) {
            document.querySelectorAll('.main-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
