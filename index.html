<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO Recording System - Final Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #1a1c3d; --bg: #dbe2ef; --blue: #4d44ff; --gray: #6c757d; --success: #2ecc71; --error: #e74c3c; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background: var(--sidebar); color: white; padding: 20px 0; flex-shrink: 0; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; color: #aeb2cc; text-decoration: none; font-size: 14px; }
        .nav-item.active { background: var(--blue); color: white; border-radius: 0 50px 50px 0; margin-right: 10px; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .top-row { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; margin-bottom: 25px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .card-title { color: var(--sidebar); font-weight: bold; border-left: 4px solid var(--blue); padding-left: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .scan-group { display: flex; background: #f1f3f9; border-radius: 10px; padding: 5px; margin-bottom: 20px; }
        .btn-scan { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; background: white; color: var(--success); box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; gap: 8px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-item { flex: 1; }
        label { display: block; font-size: 11px; color: var(--gray); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #e1e5ee; border-radius: 8px; background: #f8f9fc; outline: none; box-sizing: border-box; }
        .info-box { background: #f8f9fc; padding: 12px; border-radius: 8px; min-height: 20px; color: #333; font-weight: 600; border: 1px solid #f0f2f5; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #a0aec0; font-size: 12px; padding: 12px; border-bottom: 1px solid #edf2f7; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #f7f9fc; font-size: 14px; }
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; background: #e1f7e7; color: var(--success); }
        #stt { font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active"><i class="fas fa-microphone"></i> Recording BPO PT</div>
        <div class="nav-item"><i class="fas fa-wallet"></i> Total VND Request</div>
        <div class="nav-item"><i class="fas fa-chart-line"></i> Fill rate</div>
    </div>

    <div class="main">
        <div class="top-row">
            <div class="card">
                <div class="card-title">
                    INPUT WFM ID 
                    <span id="stt" style="color: var(--error);">Connecting...</span>
                </div>
                
                <div class="scan-group">
                    <button class="btn-scan"><i class="fas fa-sign-in-alt"></i> SCAN IN</button>
                </div>

                <div class="form-row">
                    <div class="form-item">
                        <label>Project Code</label>
                        <select id="proj"><option value="VNDB">VNDB</option><option value="VNDL">VNDL</option></select>
                    </div>
                    <div class="form-item">
                        <label>Time</label>
                        <select><option>09:00</option></select>
                    </div>
                    <div class="form-item">
                        <label>Shift</label>
                        <select id="shift"><option value="Day">Day</option><option value="Night">Night</option></select>
                    </div>
                </div>

                <label>BPO Staff ID (WFM ID)</label>
                <input type="text" id="wfmInput" placeholder="Dán mã WFM và nhấn Enter..." autocomplete="off">
            </div>

            <div class="card">
                <div class="card-title">BPO PT INFORMATION</div>
                <div class="form-row">
                    <div class="form-item">
                        <label>VENDOR (NHÀ THẦU)</label>
                        <div class="info-box" id="resVendor">-</div>
                    </div>
                    <div class="form-item">
                        <label>FULL NAME (HỌ VÀ TÊN)</label>
                        <div class="info-box" id="resName">-</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>WFM ID</label>
                        <div class="info-box" id="resID">-</div>
                    </div>
                    <div class="form-item">
                        <label>USER WFM ID</label>
                        <div class="info-box" id="resUserID">-</div>
                    </div>
                </div>
                <label>WFM EMAIL</label>
                <div class="info-box" id="resEmail">-</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">DATA ENTRY</div>
            <table>
                <thead>
                    <tr>
                        <th>Scanned At</th>
                        <th>Warehouse</th>
                        <th>WFM ID</th>
                        <th>Full name</th>
                        <th>Scan Type</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="logList"></tbody>
            </table>
        </div>
    </div>

    <script>
        // LINK CSV CHUẨN CỦA BẠN (ĐÃ FIX LỖI KÝ TỰ DƯ THỪA)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTj_oKLgnuBywkM3yef66KdvHfhYD1pAslJW76vbVWBnaZTCPl13XHgto9Op_-AkTjPAbvPPA0yE6rk/pub?gid=0&single=true&output=csv';
        
        let database = [];
        const ting = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function initData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                // Tách dòng và xử lý CSV
                database = text.split('\n')
                               .filter(line => line.trim() !== '')
                               .map(row => row.split(',').map(cell => cell.trim()));
                
                document.getElementById('stt').innerText = "Data Ready";
                document.getElementById('stt').style.color = "#2ecc71";
            } catch (err) {
                document.getElementById('stt').innerText = "Lỗi kết nối!";
                document.getElementById('stt').style.color = "#e74c3c";
                console.error("Lỗi tải dữ liệu:", err);
            }
        }

        document.getElementById('wfmInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const inputId = this.value.trim();
                if (!inputId) return;

                // Tìm mã nhân viên ở cột A (index 0)
                const found = database.find(row => row[0] === inputId);

                if (found) {
                    ting.play(); 

                    // Đổ dữ liệu vào các tọa độ ID tương ứng
                    document.getElementById('resVendor').innerText = found[1] || "N/A"; // Cột B -> VENDOR
                    document.getElementById('resName').innerText   = found[2] || "N/A"; // Cột C -> FULL NAME
                    document.getElementById('resID').innerText     = found[0] || "N/A"; // Cột A -> WFM ID
                    document.getElementById('resUserID').innerText = found[3] || "N/A"; // Cột D -> USER ID
                    document.getElementById('resEmail').innerText  = found[4] || "N/A"; // Cột E -> EMAIL

                    // Thêm dòng mới vào bảng lịch sử
                    addLogRow(found);
                    this.value = ''; // Xóa ô nhập để quét tiếp
                } else {
                    alert("Không tìm thấy nhân viên với mã: " + inputId);
                }
            }
        });

        function addLogRow(data) {
            const table = document.getElementById('logList');
            const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const pj = document.getElementById('proj').value;
            
            const html = `<tr>
                <td>${time}</td>
                <td>${pj}</td>
                <td>${data[0]}</td>
                <td>${data[2]}</td>
                <td><b style="color:#2ecc71">IN</b></td>
                <td><span class="status-badge">Success</span></td>
            </tr>`;
            table.insertAdjacentHTML('afterbegin', html);
        }

        // Tải dữ liệu ngay khi mở trang
        window.onload = initData;
    </script>
</body>
</html>
